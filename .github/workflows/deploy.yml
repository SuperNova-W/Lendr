name: Deploy

on:
  push:
    branches: [master]

env:
  REGION: us-central1
  BACKEND_SERVICE: lend-backend
  REPO: lend

jobs:
  # ── Backend: Cloud Run ──────────────────────────────────────────────────────
  deploy-backend:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        id: build
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/backend:${{ github.sha }}"
          docker build -t "$IMAGE" ./Backend
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.BACKEND_SERVICE }} \
            --image "${{ steps.build.outputs.image }}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --timeout 60 \
            --set-secrets "\
              DATABASE_URL=lendr-database-url:latest,\
              SUPABASE_URL=lendr-supabase-url:latest,\
              SUPABASE_SERVICE_KEY=lendr-supabase-service-key:latest,\
              GOOGLE_CLIENT_ID=lendr-google-client-id:latest,\
              SECRET_KEY=lendr-secret-key:latest" \
            --set-env-vars "ALLOWED_ORIGINS=https://${{ secrets.GCP_PROJECT_ID }}.web.app,http://localhost:8081" \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --quiet

  # ── Frontend: Firebase Hosting ──────────────────────────────────────────────
  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: cd Frontend && npm ci

      - name: Export Expo web build
        run: cd Frontend && npx expo export --platform web
        env:
          EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
          EXPO_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_CLIENT_ID }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ secrets.GCP_PROJECT_ID }}
